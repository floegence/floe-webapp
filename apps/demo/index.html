<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F3F0EC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0E121B" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-icon.png" />
    <title>Floe Webapp Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Restore mode and shell palette before the app mounts.
      (function () {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const fallbackMode = 'system';
        const defaults = { light: 'classic-light', dark: 'classic-dark' };
        const validPresets = {
          light: [
            'classic-light',
            'paper',
            'mist',
            'meadow',
            'citrus',
            'lilac',
            'light-plus',
            'quiet-light',
            'solarized-light',
            'github-light',
            'hc-light',
          ],
          dark: [
            'classic-dark',
            'ink',
            'slate',
            'forest',
            'ember',
            'ocean',
            'dark-plus',
            'monokai',
            'nord',
            'dracula',
            'abyss',
          ],
        };
        let theme = fallbackMode;
        let selection = { version: 1, ...defaults };

        try {
          const storedMode = JSON.parse(localStorage.getItem('floe-demo-notes-theme') || 'null');
          if (storedMode === 'light' || storedMode === 'dark' || storedMode === 'system') {
            theme = storedMode;
          }

          const storedSelection = JSON.parse(
            localStorage.getItem('floe-demo-notes-theme-shell-preset') || 'null'
          );
          if (storedSelection && storedSelection.version === 1) {
            for (const mode of ['light', 'dark']) {
              if (validPresets[mode].includes(storedSelection[mode])) {
                selection[mode] = storedSelection[mode];
              }
            }
          }
        } catch {
          // Storage may be unavailable; defaults still produce a complete first frame.
        }

        const resolved = theme === 'system' ? (prefersDark ? 'dark' : 'light') : theme;
        document.documentElement.classList.add(resolved);
        document.documentElement.style.colorScheme = resolved;
        document.documentElement.setAttribute('data-floe-shell-theme', selection[resolved]);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
