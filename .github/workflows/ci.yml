name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        run: |
          set -euo pipefail
          PNPM_VERSION="$(node --input-type=module -e 'import fs from "node:fs"; const spec = JSON.parse(fs.readFileSync("package.json", "utf8")).packageManager; const match = /^pnpm@([^+]+)(?:\+.*)?$/.exec(spec); if (!match) throw new Error("Unsupported packageManager: " + spec); console.log(match[1]);')"
          npm install -g "pnpm@${PNPM_VERSION}"
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check
        run: make check
